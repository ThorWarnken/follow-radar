<script>window.__followRadarTest = {};</script>
<script src="b.js"></script>
<script>
(()=>{
  const out=document.getElementById('out');
  const sum=document.getElementById('summary');
  let passed=0,failed=0;
  let _q=Promise.resolve();
  window.test=function(name,fn){
    _q=_q.then(()=>{
      try{
        const r=fn();
        if(r&&typeof r.then==='function'){
          return r.then(()=>{passed++;render(name,true)},e=>{failed++;render(name,false,e)});
        }
        passed++;render(name,true);
      }catch(e){failed++;render(name,false,e)}
    });
  };
  window.assert=function(cond,msg){if(!cond)throw new Error(msg||'assertion failed')};
  window.assertEq=function(a,b,msg){
    const ja=JSON.stringify(a),jb=JSON.stringify(b);
    if(ja!==jb)throw new Error((msg||'not equal')+'\n  expected: '+jb+'\n  actual:   '+ja);
  };
  function render(name,ok,err){
    const d=document.createElement('div');
    d.className='test '+(ok?'pass':'fail');
    d.textContent=(ok?'PASS  ':'FAIL  ')+name+(err?'\n  '+(err.stack||err.message||err):'');
    out.appendChild(d);
  }
  window.addEventListener('load',()=>{
    _q.then(()=>{
      const total=passed+failed;
      sum.textContent=`${passed}/${total} passed`;
      sum.className='summary '+(failed===0?'ok':'bad');
    });
  });
})();
</script>

<script>
test('RateLimitError is an Error subclass', () => {
  const E = window.__followRadarTest.RateLimitError;
  const e = new E('429');
  assert(e instanceof Error, 'should be Error');
  assert(e instanceof E, 'should be RateLimitError');
  assertEq(e.name, 'RateLimitError');
  assertEq(e.reason, '429');
  assert(e.message.indexOf('429') >= 0, 'message includes reason');
});

test('constants are exposed', () => {
  const c = window.__followRadarTest.constants;
  assertEq(c.MAX_ACCOUNT_SIZE, 10000);
  assert(typeof c.SCAN_CAP === 'number', 'SCAN_CAP should be a number');
  assert(typeof c.SCROLL_PAUSE_MS === 'number', 'SCROLL_PAUSE_MS should be a number');
  assert(typeof c.SCROLL_SETTLE_MS === 'number', 'SCROLL_SETTLE_MS should be a number');
  assert(typeof c.COOLDOWN_MS === 'number', 'COOLDOWN_MS should be a number');
  assert(typeof c.COOLDOWN_KEY === 'string', 'COOLDOWN_KEY should be a string');
  assertEq(c.RESUME_KEY, 'follow-radar:resume');
});
</script>

<script>
test('encodePayload / decodePayload round-trip on small object', async () => {
  const enc = window.__followRadarTest.encodePayload;
  const dec = window.__followRadarTest.decodePayload;
  const obj = { username: 'thor', followers: [{username:'a',full_name:'A',is_private:false}] };
  const s = await enc(obj);
  assert(typeof s === 'string', 'should return string');
  assert(s.startsWith('g:') || s.startsWith('r:'), 'should have tag prefix');
  const back = await dec(s);
  assertEq(back, obj);
});

test('encodePayload / decodePayload round-trip on 2000-account list', async () => {
  const enc = window.__followRadarTest.encodePayload;
  const dec = window.__followRadarTest.decodePayload;
  const followers = [];
  for (let i = 0; i < 2000; i++) {
    followers.push({username: 'user' + i, full_name: 'User ' + i, is_private: i % 7 === 0});
  }
  const obj = {username: 'thor', userId: '123', scrapedAt: '2026-04-07T00:00:00Z', followers, following: []};
  const s = await enc(obj);
  const back = await dec(s);
  assertEq(back.followers.length, 2000);
  assertEq(back.followers[0], followers[0]);
  assertEq(back.followers[1999], followers[1999]);
});

test('decodePayload throws on garbage', async () => {
  const dec = window.__followRadarTest.decodePayload;
  let threw = false;
  try { await dec('x:notreal'); } catch (e) { threw = true; }
  assert(threw, 'should throw on unknown tag');
});

test('encodePayload + decodePayload round-trips with mutual_count', async function () {
  var users = [];
  for (var i = 0; i < 100; i++) {
    users.push({ username: 'user' + i, full_name: 'User ' + i, is_private: false, mutual_count: i % 5 });
  }
  var obj = { username: 'me', followers: users, following: users, scrapedAt: new Date().toISOString() };
  var encoded = await window.__followRadarTest.encodePayload(obj);
  var decoded = await window.__followRadarTest.decodePayload(encoded);
  assert(decoded.followers.length === 100, 'should round-trip 100 followers');
  assert(decoded.followers[3].mutual_count === 3, 'mutual_count should survive round-trip');
});
</script>

<script>
function mockStorage() {
  const data = {};
  return {
    getItem: k => (k in data) ? data[k] : null,
    setItem: (k, v) => { data[k] = String(v); },
    removeItem: k => { delete data[k]; },
    _data: data,
  };
}

test('saveResumeState writes JSON with timestamp', () => {
  const s = mockStorage();
  const save = window.__followRadarTest.saveResumeState;
  save({userId: 'u1', cursor: 'abc', phase: 'followers', partialFollowers: [], partialFollowing: []}, s);
  const raw = s.getItem('follow-radar:resume');
  assert(raw, 'should write something');
  const obj = JSON.parse(raw);
  assertEq(obj.userId, 'u1');
  assertEq(obj.cursor, 'abc');
  assert(typeof obj.timestamp === 'number');
});

test('loadResumeState returns null when nothing stored', () => {
  const s = mockStorage();
  const load = window.__followRadarTest.loadResumeState;
  assertEq(load('u1', s), null);
});

test('loadResumeState returns state when user matches and not stale', () => {
  const s = mockStorage();
  const save = window.__followRadarTest.saveResumeState;
  const load = window.__followRadarTest.loadResumeState;
  save({userId: 'u1', cursor: 'abc'}, s);
  const r = load('u1', s);
  assert(r && !r.mismatch, 'should return real state');
  assertEq(r.userId, 'u1');
  assertEq(r.cursor, 'abc');
});

test('loadResumeState returns mismatch when userId differs', () => {
  const s = mockStorage();
  const save = window.__followRadarTest.saveResumeState;
  const load = window.__followRadarTest.loadResumeState;
  save({userId: 'u1', cursor: 'abc'}, s);
  const r = load('u2', s);
  assert(r && r.mismatch === true, 'should return mismatch object');
  assertEq(r.userId, 'u1');
});

test('loadResumeState returns null when stale (>24h)', () => {
  const s = mockStorage();
  const load = window.__followRadarTest.loadResumeState;
  const stale = {userId: 'u1', cursor: 'abc', timestamp: Date.now() - (25 * 60 * 60 * 1000)};
  s.setItem('follow-radar:resume', JSON.stringify(stale));
  assertEq(load('u1', s), null);
});

test('clearResumeState removes the key', () => {
  const s = mockStorage();
  const save = window.__followRadarTest.saveResumeState;
  const clear = window.__followRadarTest.clearResumeState;
  save({userId: 'u1'}, s);
  assert(s.getItem('follow-radar:resume') !== null);
  clear(s);
  assertEq(s.getItem('follow-radar:resume'), null);
});

test('loadResumeState returns null on garbage JSON', () => {
  const s = mockStorage();
  const load = window.__followRadarTest.loadResumeState;
  s.setItem('follow-radar:resume', 'not valid json');
  assertEq(load('u1', s), null);
});
</script>

<script>

<script>
  // ─── DOM utility tests ─────────────────────────────────────────

  test('sleep delays for at least the specified time', async function () {
    var start = Date.now();
    await window.__followRadarTest.sleep(50);
    var elapsed = Date.now() - start;
    assert(elapsed >= 45, 'sleep should delay at least ~50ms, got ' + elapsed);
  });

  test('waitForEl resolves when element appears', async function () {
    var container = document.createElement('div');
    document.body.appendChild(container);
    setTimeout(function () {
      var el = document.createElement('span');
      el.setAttribute('data-test', 'wfe');
      container.appendChild(el);
    }, 50);
    var found = await window.__followRadarTest.waitForEl(container, '[data-test="wfe"]', 2000);
    assert(found !== null, 'should find the element');
    assert(found.getAttribute('data-test') === 'wfe', 'should be the right element');
    container.remove();
  });

  test('waitForEl rejects on timeout', async function () {
    var container = document.createElement('div');
    try {
      await window.__followRadarTest.waitForEl(container, '[data-test="nope"]', 100);
      assert(false, 'should have thrown');
    } catch (e) {
      assert(e.message.indexOf('timed out') !== -1, 'should mention timeout');
    }
  });

  test('findByText finds element by case-insensitive text', function () {
    var container = document.createElement('div');
    var a = document.createElement('a');
    a.textContent = '1,234 followers';
    var b = document.createElement('a');
    b.textContent = '567 following';
    container.appendChild(a);
    container.appendChild(b);
    var found = window.__followRadarTest.findByText(container, 'followers');
    assert(found === a, 'should find the followers link');
    var found2 = window.__followRadarTest.findByText(container, 'Followers');
    assert(found2 === a, 'should be case-insensitive');
  });

  test('extractUsernameFromHref parses username from profile links', function () {
    var ex = window.__followRadarTest.extractUsernameFromHref;
    assert(ex('/johndoe/') === 'johndoe', 'simple username');
    assert(ex('https://www.instagram.com/johndoe/') === 'johndoe', 'full URL');
    assert(ex('/explore/') === null, 'reserved path');
    assert(ex('/reels/') === null, 'reserved path reels');
    assert(ex('/p/ABC123/') === null, 'post link');
    assert(ex('/stories/johndoe/') === null, 'stories link');
  });

  test('parseMutualText extracts mutual count from IG text', function () {
    var p = window.__followRadarTest.parseMutualText;
    assert(p('Followed by sarah_j and 3 others') === 4, '1 named + 3 others = 4');
    assert(p('Followed by sarah_j, mike and 5 others') === 7, '2 named + 5 others = 7');
    assert(p('Followed by sarah_j and mike') === 2, '2 named no others');
    assert(p('Followed by sarah_j') === 1, '1 named');
    assert(p('') === 0, 'empty string');
    assert(p('Some random text') === 0, 'no match');
  });
</script>

<script>
  // ─── Popup management tests ────────────────────────────────────

  test('parseCountText parses various count formats', function () {
    var p = window.__followRadarTest.parseCountText;
    assert(p('1,234') === 1234, 'comma-separated');
    assert(p('567') === 567, 'plain number');
    assert(p('12.5K') === 12500, 'K suffix');
    assert(p('1.2M') === 1200000, 'M suffix');
    assert(p('0') === 0, 'zero');
  });

  test('openScanPopup is a callable function', function () {
    var fn = window.__followRadarTest.openScanPopup;
    assert(typeof fn === 'function', 'should be exported');
  });

  test('readAccountSize reads from mock DOM', function () {
    // Create a mock popup-like object with a mock document
    var container = document.createElement('div');
    var followersLink = document.createElement('a');
    followersLink.setAttribute('href', '/testuser/followers/');
    followersLink.textContent = '1,234 followers';
    var followingLink = document.createElement('a');
    followingLink.setAttribute('href', '/testuser/following/');
    followingLink.textContent = '567 following';
    container.appendChild(followersLink);
    container.appendChild(followingLink);

    // Mock popup with querySelectorAll
    var mockDoc = {
      querySelectorAll: function(sel) { return container.querySelectorAll(sel); }
    };
    var mockPopup = { document: mockDoc };
    var result = window.__followRadarTest.readAccountSize(mockPopup);
    assert(result.followers === 1234, 'followers count, got ' + result.followers);
    assert(result.following === 567, 'following count, got ' + result.following);
  });
</script>

<script>
  // ─── Modal scraping tests ──────────────────────────────────────

  test('readUserRow extracts user info from mock DOM row', function () {
    var container = document.createElement('div');
    container.setAttribute('role', 'button');
    container.innerHTML =
      '<div><a href="/janedoe/">janedoe</a></div>' +
      '<span>Jane Doe</span>' +
      '<span>Followed by mike and 3 others</span>' +
      '<span>Follow</span>';
    var link = container.querySelector('a');
    var result = window.__followRadarTest.readUserRow(link, 'janedoe');
    assert(result.username === 'janedoe', 'username');
    assert(result.full_name === 'Jane Doe', 'full name');
    assert(result.mutual_count === 4, 'mutual count: 1 named + 3 others');
  });

  test('readUserRow handles verified badge', function () {
    var container = document.createElement('div');
    container.setAttribute('role', 'button');
    container.innerHTML =
      '<div><a href="/celeb/">celeb</a></div>' +
      '<span>Celebrity Name</span>' +
      '<svg aria-label="Verified"></svg>';
    var link = container.querySelector('a');
    var result = window.__followRadarTest.readUserRow(link, 'celeb');
    assert(result.is_verified === true, 'should detect verified');
  });

  test('readUserRow skips button text for full name', function () {
    var container = document.createElement('div');
    container.setAttribute('role', 'button');
    container.innerHTML =
      '<div><a href="/someone/">someone</a></div>' +
      '<span>Following</span>';
    var link = container.querySelector('a');
    var result = window.__followRadarTest.readUserRow(link, 'someone');
    assert(result.full_name === '', 'should not use Following as full name');
  });
</script>

<script>
  // ─── Post grid scraping tests ──────────────────────────────────

  test('readPostTile extracts post info from mock DOM', function () {
    var container = document.createElement('article');
    var link = document.createElement('a');
    link.setAttribute('href', '/p/ABC123/');
    link.innerHTML = '<div><span>42 likes</span><span>5 comments</span></div>';
    container.appendChild(link);
    document.body.appendChild(container);

    var result = window.__followRadarTest.readPostTile(link, '/p/ABC123/');
    assert(result.id === 'ABC123', 'post id');
    assert(result.like_count === 42, 'like count');
    assert(result.comment_count === 5, 'comment count');
    assert(result.media_type === 1, 'photo type');
    container.remove();
  });

  test('readPostTile detects reels', function () {
    var link = document.createElement('a');
    link.setAttribute('href', '/reel/XYZ789/');
    var result = window.__followRadarTest.readPostTile(link, '/reel/XYZ789/');
    assert(result.media_type === 2, 'reel should be video type');
  });
</script>

<script>
  // ─── React fiber fallback tests ────────────────────────────────

  test('getFiberKey finds React fiber property', function () {
    var el = document.createElement('div');
    el['__reactFiber$abc123'] = { memoizedProps: {} };
    var key = window.__followRadarTest.getFiberKey(el);
    assert(key === '__reactFiber$abc123', 'should find fiber key');
  });

  test('getFiberKey returns null for non-React elements', function () {
    var el = document.createElement('div');
    var key = window.__followRadarTest.getFiberKey(el);
    assert(key === null, 'should return null');
  });

  test('getReactFiberData finds data walking up fiber tree', function () {
    var el = document.createElement('div');
    var mockUsers = [{ username: 'test1' }, { username: 'test2' }];
    el['__reactFiber$xyz'] = {
      memoizedProps: {},
      return: {
        memoizedProps: { users: mockUsers },
        return: null
      },
      child: null,
      sibling: null
    };
    var result = window.__followRadarTest.getReactFiberData(el, 'users');
    assert(result === mockUsers, 'should find users array walking up');
    assert(result.length === 2, 'should have 2 users');
  });

  test('getReactFiberData returns null when key not found', function () {
    var el = document.createElement('div');
    el['__reactFiber$xyz'] = {
      memoizedProps: { other: 'data' },
      return: null,
      child: null,
      sibling: null
    };
    var result = window.__followRadarTest.getReactFiberData(el, 'users');
    assert(result === null, 'should return null when key not found');
  });
</script>
